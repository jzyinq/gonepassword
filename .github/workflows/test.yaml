name: Test
on: push
jobs:
  run-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: Install golang
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Run tests
        run: make tests

